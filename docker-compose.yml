services:
  zfs-dash:
    image: ghcr.io/crazyuploader/zfs-dash:main
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Kolkata
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
