services:
  zfs-dash:
    image: ghcr.io/crazyuploader/zfs-dash:main
    container_name: zfs-dash
    user: 1000:1000
    command: ["serve", "--config", "/config/config.yaml"]
    ports:
      - "8054:8054"
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    environment:
      - TZ=Asia/Kolkata
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8054/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
